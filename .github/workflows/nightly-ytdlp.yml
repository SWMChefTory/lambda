name: Nightly yt-dlp refresh

on:
  workflow_dispatch:
  schedule:
    - cron: "30 18 * * *"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    env:
      PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
      REGION: ${{ secrets.GCP_REGION }}
      BASE_IMAGE: ${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/base/python-ytdlp-deno:nightly
      APP_IMAGE:  ${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/services/lambda-migrated:latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Auth to GCP (WIF)
        uses: google-github-actions/auth@v2
        with:
          token_format: access_token
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SA_EMAIL }}
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Force gcloud project
        run: |
          gcloud config set project "$PROJECT_ID"
          gcloud config get-value project

      - name: Debug context
        run: |
          echo "PROJECT_ID=$PROJECT_ID REGION=$REGION"
          gcloud config list
          gcloud projects describe "$PROJECT_ID" --format="value(projectId,projectNumber)"

      - name: Configure Docker auth for Artifact Registry
        run: |
          gcloud auth configure-docker $REGION-docker.pkg.dev --quiet

      - name: Build & push base image (basesetting)
        run: |
          gcloud builds submit ./basesetting --tag "$BASE_IMAGE" --gcs-source-staging-dir "gs://${PROJECT_ID}_cloudbuild/source"

      - name: Build & push app image (service)
        run: |
          gcloud builds submit ./service --tag "$APP_IMAGE" --gcs-source-staging-dir "gs://${PROJECT_ID}_cloudbuild/source"

      - name: Rollout to Cloud Run services
        run: |
          SERVICES="${{ secrets.CLOUDRUN_SERVICES }}"
          if [ -z "$SERVICES" ]; then
            SERVICES=$(printf "captionlambda-%s," $(seq 1 13) | sed 's/,$//')
          fi

          IFS=',' read -ra arr <<< "$SERVICES"
          for svc in "${arr[@]}"; do
            echo "== update $svc =="
            gcloud run services update "$svc" \
              --region "$REGION" \
              --image "$APP_IMAGE" \
              --quiet
          done